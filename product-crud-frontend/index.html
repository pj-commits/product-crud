<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product CRUD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Products</h4>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Product</button>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-md-4">
      <input type="text" id="keywordFilter" class="form-control form-control-sm" placeholder="Search by title..." oninput="fetchProducts()"/>
    </div>
    <div class="col-md-3">
      <select id="sortBy" class="form-select form-select-sm" onchange="fetchProducts()">
        <option value="title">Sort by Title</option>
        <option value="pieces">Sort by Pieces</option>
        <option value="status">Sort by Status</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="sortOrder" class="form-select form-select-sm" onchange="fetchProducts()">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>
    </div>
    <div class="col-md-2">
      <select id="pageSize" class="form-select form-select-sm" onchange="fetchProducts()">
        <option value="5">5 per page</option>
        <option value="10" selected>10 per page</option>
        <option value="20">20 per page</option>
      </select>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Pieces</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productTable">
          <tr><td colspan="6" class="text-center py-3 text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3">
    <small class="text-muted" id="pageInfo"></small>
    <div id="pagination" class="d-flex gap-2"></div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="productId"/>
        <div class="mb-3">
          <label class="form-label">Title <span class="text-danger">*</span></label>
          <input type="text" id="title" class="form-control" placeholder="Product title"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="3" placeholder="Description"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Pieces</label>
          <input type="number" id="pieces" class="form-control" placeholder="Number of pieces"/>
        </div>
        <div id="formError" class="text-danger small d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <p class="mb-1">Delete this product?</p>
        <small class="text-muted" id="deleteProductName"></small>
      </div>
      <div class="modal-footer justify-content-center border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
